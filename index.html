<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ClearRoute — Surveillance Commute Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: #2a2a3d;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --accent: #00e5ff;
      --accent-dim: rgba(0,229,255,0.12);
      --warn: #ff6b35;
      --warn-dim: rgba(255,107,53,0.12);
      --good: #39d98a;
      --good-dim: rgba(57,217,138,0.12);
      --font: 'Space Grotesk', sans-serif;
      --mono: 'Space Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* LAYOUT */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* HEADER */
    header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* PANEL */
    #panel {
      flex-shrink: 0;
      padding: 16px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 14px;
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    .input-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-start { background: var(--accent); }
    .dot-end { background: var(--warn); }

    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 13px 0;
    }

    .input-row input::placeholder { color: var(--muted); }

    /* AUTOCOMPLETE */
    .input-wrap {
      position: relative;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 30;
      max-height: 240px;
      overflow-y: auto;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .suggestions.visible { display: block; }

    .suggestion-item {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      line-height: 1.4;
    }

    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:active { background: var(--accent-dim); }

    .suggestion-main {
      font-weight: 500;
      color: var(--text);
    }

    .suggestion-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: var(--mono);
    }

    .suggestion-empty {
      padding: 14px;
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      text-align: center;
    }

    .btn-analyze {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-analyze:active { transform: scale(0.98); opacity: 0.9; }
    .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* MAP */
    #map {
      flex: 1;
      min-height: 0;
      z-index: 1;
    }

    /* RESULT CARD */
    #result-card {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: 0 auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 32px;
      z-index: 20;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }

    #result-card.visible { transform: translateY(0); }
    #result-card.collapsed { transform: translateY(calc(100% - 56px)); }

    .card-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 18px;
      cursor: pointer;
    }

    .card-handle-zone {
      padding: 14px 0 0;
      margin: -14px 0 4px;
      cursor: pointer;
    }

    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .score-label {
      font-size: 12px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .score-badge {
      font-size: 13px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      font-family: var(--mono);
    }

    .score-low { background: var(--good-dim); color: var(--good); border: 1px solid var(--good); }
    .score-mid { background: rgba(255,220,50,0.12); color: #ffd632; border: 1px solid #ffd632; }
    .score-high { background: var(--warn-dim); color: var(--warn); border: 1px solid var(--warn); }

    .big-number {
      font-size: 52px;
      font-weight: 700;
      font-family: var(--mono);
      line-height: 1;
      margin-bottom: 4px;
      color: var(--text);
    }

    .big-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .stat-val {
      font-size: 20px;
      font-weight: 700;
      font-family: var(--mono);
      color: var(--text);
    }

    .stat-key {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .camera-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }

    .camera-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .camera-item-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--warn);
      flex-shrink: 0;
    }

    /* STATUS */
    #status {
      padding: 10px 20px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      text-align: center;
      flex-shrink: 0;
    }

    /* LOADING SPINNER */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* LEAFLET OVERRIDES */
    .leaflet-container { background: #0d0d15; }
    .leaflet-control-attribution { display: none; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    .camera-marker {
      width: 10px;
      height: 10px;
      background: var(--warn);
      border-radius: 50%;
      border: 2px solid rgba(255,107,53,0.4);
      box-shadow: 0 0 8px rgba(255,107,53,0.6);
    }

    .camera-marker.on-route {
      background: #ff2d55;
      box-shadow: 0 0 12px rgba(255,45,85,0.9);
      border-color: rgba(255,45,85,0.5);
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">👁</div>
      <div>
        <div class="logo-text">ClearRoute</div>
        <div class="logo-sub">Surveillance Commute Checker</div>
      </div>
    </div>
  </header>

  <div id="panel">
    <div class="input-group">
      <div class="input-wrap">
        <div class="input-row">
          <div class="input-dot dot-start"></div>
          <input id="start-input" type="text" placeholder="Starting address" autocomplete="off" />
        </div>
        <div class="suggestions" id="start-suggestions"></div>
      </div>
      <div class="input-wrap">
        <div class="input-row">
          <div class="input-dot dot-end"></div>
          <input id="end-input" type="text" placeholder="Destination address" autocomplete="off" />
        </div>
        <div class="suggestions" id="end-suggestions"></div>
      </div>
    </div>
    <button class="btn-analyze" id="analyze-btn" onclick="analyze()">Check My Commute</button>
  </div>

  <div id="map"></div>
  <div id="status"></div>

  <div id="result-card">
    <div class="card-handle-zone" id="card-handle-zone">
      <div class="card-handle"></div>
    </div>
    <div class="score-row">
      <div class="score-label">Surveillance Score</div>
      <div class="score-badge" id="score-badge">—</div>
    </div>
    <div class="big-number" id="big-number">0</div>
    <div class="big-label" id="big-label">cameras detected along your route</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val" id="stat-dist">—</div>
        <div class="stat-key">Route length</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-density">—</div>
        <div class="stat-key">Cameras / mile</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-alpr">—</div>
        <div class="stat-key">ALPR cameras</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-cctv">—</div>
        <div class="stat-key">Other cameras</div>
      </div>
    </div>
    <div class="camera-list" id="camera-list"></div>
  </div>
</div>

<script>
// ── MAP INIT ──────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([39.8283, -98.5795], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

let routeLayer = null;
let cameraMarkers = [];

// ── GEOCODE / AUTOCOMPLETE via Nominatim ──────────────────────────────────────
// Selected coordinates get stored here once the user picks a suggestion
const selectedLocations = {
  start: null, // { lat, lon, display }
  end: null
};

let debounceTimers = { start: null, end: null };

async function fetchSuggestions(query) {
  if (!query || query.length < 3) return [];
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=6&countrycodes=us`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  return res.json();
}

function renderSuggestions(field, results) {
  const box = document.getElementById(`${field}-suggestions`);
  if (!results.length) {
    box.innerHTML = '<div class="suggestion-empty">No matches — try adding city/state</div>';
    box.classList.add('visible');
    return;
  }
  box.innerHTML = results.map((r, i) => {
    const parts = r.display_name.split(',');
    const main = parts[0];
    const sub = parts.slice(1, 4).join(',').trim();
    return `<div class="suggestion-item" data-idx="${i}">
      <div class="suggestion-main">${main}</div>
      <div class="suggestion-sub">${sub}</div>
    </div>`;
  }).join('');
  box.classList.add('visible');

  box.querySelectorAll('.suggestion-item').forEach(el => {
    el.addEventListener('click', () => {
      const r = results[parseInt(el.dataset.idx)];
      selectedLocations[field] = { lat: parseFloat(r.lat), lon: parseFloat(r.lon), display: r.display_name };
      document.getElementById(`${field}-input`).value = r.display_name.split(',').slice(0, 3).join(',').trim();
      box.classList.remove('visible');
    });
  });
}

function setupAutocomplete(field) {
  const input = document.getElementById(`${field}-input`);
  const box = document.getElementById(`${field}-suggestions`);

  input.addEventListener('input', () => {
    selectedLocations[field] = null; // typing invalidates previous selection
    const query = input.value.trim();
    clearTimeout(debounceTimers[field]);
    if (query.length < 3) {
      box.classList.remove('visible');
      return;
    }
    debounceTimers[field] = setTimeout(async () => {
      try {
        const results = await fetchSuggestions(query);
        renderSuggestions(field, results);
      } catch (e) {
        box.classList.remove('visible');
      }
    }, 350);
  });

  input.addEventListener('focus', () => {
    if (box.innerHTML) box.classList.add('visible');
  });

  document.addEventListener('click', (e) => {
    if (!input.contains(e.target) && !box.contains(e.target)) {
      box.classList.remove('visible');
    }
  });
}

setupAutocomplete('start');
setupAutocomplete('end');

// Fallback geocode if user typed an address but never tapped a suggestion
async function geocodeFallback(address) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1&countrycodes=us`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  const data = await res.json();
  if (!data.length) throw new Error(`Could not find: "${address}"`);
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
}

// ── ROUTE via OSRM ────────────────────────────────────────────────────────────
async function getRoute(start, end) {
  const url = `https://router.project-osrm.org/route/v1/driving/${start.lon},${start.lat};${end.lon},${end.lat}?overview=full&geometries=geojson&alternatives=false`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.code !== 'Ok') throw new Error('Could not calculate route');
  return data.routes[0];
}

// ── BUILD OVERPASS BBOX from route coords ─────────────────────────────────────
function routeBbox(coords) {
  let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
  for (const [lon, lat] of coords) {
    if (lat < minLat) minLat = lat;
    if (lat > maxLat) maxLat = lat;
    if (lon < minLon) minLon = lon;
    if (lon > maxLon) maxLon = lon;
  }
  // pad 0.01 degrees (~700m) around bbox
  return [minLat - 0.01, minLon - 0.01, maxLat + 0.01, maxLon + 0.01];
}

// ── FETCH CAMERAS from Overpass ───────────────────────────────────────────────
async function fetchCameras(bbox) {
  const [s, w, n, e] = bbox;
  const query = `
    [out:json][timeout:25];
    (
      node["man_made"="surveillance"](${s},${w},${n},${e});
      node["surveillance:type"="ALPR"](${s},${w},${n},${e});
    );
    out body;
  `;
  const res = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    body: query
  });
  const data = await res.json();
  return data.elements || [];
}

// ── FIELD OF VIEW CONE (mimics Deflock's direction cone display) ──────────────
// Draws a filled wedge polygon pointing in the camera's facing direction.
function drawFovCone(lat, lon, directionDeg, lengthMeters = 35, spreadDeg = 50, color = '#ff2d55') {
  const R = 6371000; // earth radius m
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;

  // destination point given bearing + distance (simple flat-earth approx, fine at this scale)
  function destPoint(lat1, lon1, bearing, dist) {
    const latR = toRad(lat1), lonR = toRad(lon1), brR = toRad(bearing);
    const lat2 = Math.asin(Math.sin(latR) * Math.cos(dist / R) + Math.cos(latR) * Math.sin(dist / R) * Math.cos(brR));
    const lon2 = lonR + Math.atan2(
      Math.sin(brR) * Math.sin(dist / R) * Math.cos(latR),
      Math.cos(dist / R) - Math.sin(latR) * Math.sin(lat2)
    );
    return [toDeg(lat2), toDeg(lon2)];
  }

  const leftBearing  = directionDeg - spreadDeg / 2;
  const rightBearing = directionDeg + spreadDeg / 2;
  const steps = 8;
  const points = [[lat, lon]];

  for (let i = 0; i <= steps; i++) {
    const bearing = leftBearing + (rightBearing - leftBearing) * (i / steps);
    points.push(destPoint(lat, lon, bearing, lengthMeters));
  }
  points.push([lat, lon]);

  return L.polygon(points, {
    color: color,
    weight: 1,
    fillColor: color,
    fillOpacity: 0.22,
    opacity: 0.5
  });
}

// Parse OSM camera:direction tag — can be compass letters (N, NE, etc) or degrees
function parseDirection(tags) {
  if (!tags) return null;
  const raw = tags['camera:direction'] || tags['direction'];
  if (raw === undefined || raw === null || raw === '') return null;
  if (!isNaN(parseFloat(raw))) return parseFloat(raw);
  const compass = {
    N: 0, NNE: 22.5, NE: 45, ENE: 67.5, E: 90, ESE: 112.5, SE: 135, SSE: 157.5,
    S: 180, SSW: 202.5, SW: 225, WSW: 247.5, W: 270, WNW: 292.5, NW: 315, NNW: 337.5
  };
  return compass[raw.toUpperCase()] ?? null;
}

// ── POINT-TO-SEGMENT distance (degrees, good enough for short distances) ──────
function ptSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  if (dx === 0 && dy === 0) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy)));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

// ── FILTER cameras within ~80m of any route segment ──────────────────────────
function camerasNearRoute(cameras, routeCoords, thresholdDeg = 0.0008) {
  return cameras.filter(cam => {
    for (let i = 0; i < routeCoords.length - 1; i++) {
      const [ax, ay] = routeCoords[i];
      const [bx, by] = routeCoords[i + 1];
      const d = ptSegDist(cam.lon, cam.lat, ax, ay, bx, by);
      if (d < thresholdDeg) return true;
    }
    return false;
  });
}

// ── SCORE ─────────────────────────────────────────────────────────────────────
function scoreRoute(count, distMiles) {
  const density = distMiles > 0 ? count / distMiles : 0;
  if (density < 0.5) return { label: 'Low', cls: 'score-low' };
  if (density < 2)   return { label: 'Moderate', cls: 'score-mid' };
  return { label: 'High', cls: 'score-high' };
}

// ── STATUS helper ─────────────────────────────────────────────────────────────
function setStatus(msg, loading = false) {
  document.getElementById('status').innerHTML = loading
    ? `<span class="spinner"></span>${msg}`
    : msg;
}

// ── CLEAR map layers ──────────────────────────────────────────────────────────
function clearMap() {
  if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
  cameraMarkers.forEach(m => map.removeLayer(m));
  cameraMarkers = [];
  document.getElementById('result-card').classList.remove('visible');
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
async function analyze() {
  const startVal = document.getElementById('start-input').value.trim();
  const endVal   = document.getElementById('end-input').value.trim();
  if (!startVal || !endVal) return;

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  clearMap();
  resultCard.classList.remove('collapsed');
  document.getElementById('start-suggestions').classList.remove('visible');
  document.getElementById('end-suggestions').classList.remove('visible');

  try {
    setStatus('Finding addresses…', true);
    const start = selectedLocations.start || await geocodeFallback(startVal);
    const end   = selectedLocations.end   || await geocodeFallback(endVal);

    setStatus('Calculating route…', true);
    const route = await getRoute(start, end);
    const coords = route.geometry.coordinates; // [lon, lat] pairs

    // Draw route
    const latlngs = coords.map(([lon, lat]) => [lat, lon]);
    routeLayer = L.polyline(latlngs, {
      color: '#00e5ff',
      weight: 4,
      opacity: 0.8
    }).addTo(map);
    map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });

    // Start/end markers
    L.circleMarker([start.lat, start.lon], { radius: 7, color: '#00e5ff', fillColor: '#00e5ff', fillOpacity: 1, weight: 2 }).addTo(map);
    L.circleMarker([end.lat, end.lon], { radius: 7, color: '#ff6b35', fillColor: '#ff6b35', fillOpacity: 1, weight: 2 }).addTo(map);

    setStatus('Scanning for surveillance cameras…', true);
    const bbox = routeBbox(coords);
    const allCameras = await fetchCameras(bbox);
    const nearby = camerasNearRoute(allCameras, coords);

    // Plot camera markers + field-of-view cones (mimics Deflock's display)
    nearby.forEach(cam => {
      const direction = parseDirection(cam.tags);
      const isAlpr = cam.tags?.['surveillance:type'] === 'ALPR';
      const color = isAlpr ? '#ff2d55' : '#ff6b35';

      if (direction !== null) {
        const cone = drawFovCone(cam.lat, cam.lon, direction, 35, 50, color);
        cone.addTo(map);
        cameraMarkers.push(cone);
      }

      const cameraIcon = L.divIcon({ className: 'camera-marker on-route', iconSize: [10, 10] });
      const m = L.marker([cam.lat, cam.lon], { icon: cameraIcon })
        .bindPopup(`<b>${cam.tags?.['surveillance:type'] || 'Camera'}</b><br>${cam.tags?.operator || 'Unknown operator'}${direction !== null ? `<br>Facing: ${Math.round(direction)}°` : ''}`)
        .addTo(map);
      cameraMarkers.push(m);
    });

    // Stats
    const distMeters = route.distance;
    const distMiles  = distMeters / 1609.34;
    const alprCount  = nearby.filter(c => c.tags?.['surveillance:type'] === 'ALPR').length;
    const cctvCount  = nearby.length - alprCount;
    const density    = distMiles > 0 ? (nearby.length / distMiles).toFixed(1) : '0';
    const score      = scoreRoute(nearby.length, distMiles);

    // Populate card
    document.getElementById('big-number').textContent = nearby.length;
    document.getElementById('big-label').textContent  = nearby.length === 1
      ? 'camera detected along your route'
      : 'cameras detected along your route';
    document.getElementById('stat-dist').textContent    = distMiles.toFixed(1) + ' mi';
    document.getElementById('stat-density').textContent = density;
    document.getElementById('stat-alpr').textContent    = alprCount;
    document.getElementById('stat-cctv').textContent    = cctvCount;

    const badge = document.getElementById('score-badge');
    badge.textContent = score.label;
    badge.className   = `score-badge ${score.cls}`;

    // Camera list
    const list = document.getElementById('camera-list');
    list.innerHTML = nearby.length === 0
      ? '<div class="camera-item">No cameras mapped near this route</div>'
      : nearby.map(c => {
          const type = c.tags?.['surveillance:type'] || c.tags?.surveillance || 'Camera';
          const op   = c.tags?.operator || c.tags?.['operator:type'] || '';
          return `<div class="camera-item"><div class="camera-item-dot"></div>${type}${op ? ' · ' + op : ''}</div>`;
        }).join('');

    setStatus('');
    document.getElementById('result-card').classList.add('visible');

  } catch (err) {
    setStatus('⚠ ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

// ── RESULT CARD: tap-to-collapse + swipe-to-collapse ──────────────────────────
const resultCard = document.getElementById('result-card');
const handleZone  = document.getElementById('card-handle-zone');

handleZone.addEventListener('click', () => {
  resultCard.classList.toggle('collapsed');
});

let touchStartY = null;
handleZone.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

handleZone.addEventListener('touchend', (e) => {
  if (touchStartY === null) return;
  const deltaY = e.changedTouches[0].clientY - touchStartY;
  if (deltaY > 30) resultCard.classList.add('collapsed');
  else if (deltaY < -30) resultCard.classList.remove('collapsed');
  touchStartY = null;
});
['start-input', 'end-input'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') analyze();
  });
});
</script>
